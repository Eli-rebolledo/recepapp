services:
  - type: web
    name: recepapp
    runtime: php
    rootDir: frontend
    startCommand: php -S 0.0.0.0:10000
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
